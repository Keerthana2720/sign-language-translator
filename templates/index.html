<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <title>Sign Language Translator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap CSS -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/css/bootstrap.min.css">

    <!-- Font Awesome -->
    <link rel="stylesheet"
          href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to bottom, #000428, #004683);
            color: #fff;
        }

        .hero-section {
            padding: 70px 0;
            background: linear-gradient(
                rgba(0, 0, 0, 0.3),
                rgba(0, 0, 0, 0.3)
            ),
            url("https://coolbackgrounds.io/images/backgrounds/index/ranger-4df6c1b6.png");
            background-size: cover;
            background-position: center;
        }

        .video-box img {
            width: 100%;
            height: 400px;
            object-fit: cover;
            border: 2px solid #000;
            border-radius: 10px;
        }

        .gesture-box img {
            max-width: 900px;
            width: 100%;
            height: auto;
        }
    </style>
</head>

<body>

<!-- HERO SECTION -->
<div class="container-fluid hero-section">
    <div class="container">

        <div class="row g-5 align-items-center">

            <!-- LEFT COLUMN -->
            <div class="col-lg-6">
                <h4 class="mb-3">Convert Sign Language to Text Live</h4>
                <h1 class="display-4 fw-bold mb-4 text-primary"
                    style="text-shadow: 2px 2px 5px #000;">
                    Sign Language Translator
                </h1>

                <!-- Carousel -->
                <div id="carouselId" class="carousel slide" data-bs-interval="false">
                    <div class="carousel-inner rounded border border-dark">
                        <div class="carousel-item active">
                            <img src="https://raw.githubusercontent.com/uzibytes/Sign2Text/master/hand-signs-of-the-ASL-Language.png"
                                 class="d-block w-100">
                        </div>
                        <div class="carousel-item">
                            <img src="https://i.ibb.co/ZJ7858c/customsl.jpg"
                                 class="d-block w-100">
                        </div>
                    </div>

                    <button class="carousel-control-prev" type="button"
                            data-bs-target="#carouselId" data-bs-slide="prev">
                        <span class="carousel-control-prev-icon"></span>
                    </button>

                    <button class="carousel-control-next" type="button"
                            data-bs-target="#carouselId" data-bs-slide="next">
                        <span class="carousel-control-next-icon"></span>
                    </button>
                </div>
            </div>

            <!-- RIGHT COLUMN (CAMERA) -->
            <div class="col-lg-6 video-box">
                <img src="{{ url_for('video_feed') }}" alt="Live Camera Feed">

                <div class="d-flex align-items-center mt-3">
                    <input type="text" id="translatedText"
                           class="form-control me-2"
                           placeholder="Translated text will appear here">

                    <button id="resetButton" class="btn btn-danger me-2">
                        Reset
                    </button>

                    <button id="speakButton" class="btn btn-primary">
                        Speak
                    </button>
                </div>
            </div>

        </div>

        <!-- SUPPORTED GESTURES SECTION -->
        <div class="row mt-5">
            <div class="col-12 text-center">
                <h3 class="fw-bold mb-4">
                    Supported Sign Gestures
                </h3>

                <div class="gesture-box bg-white p-3 rounded shadow">
                    <img src="/static/sign_language_2.jpg"
                         alt="Supported Sign Gestures"
                         class="img-fluid">
                </div>
            </div>
        </div>

    </div>
</div>

<!-- FOOTER -->
<footer class="bg-dark text-center py-4">
    <p class="mb-1">Developed by M. Keerthana & M. Akhila</p>
    <p class="mb-1">Institute of Aeronautical Engineering, Hyderabad</p>
    <p class="mb-0">
        <i class="fas fa-copyright"></i>
        2025 All Rights Reserved
    </p>
</footer>

<!-- JS -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const carousel = document.getElementById("carouselId");
        if (carousel) {
            new bootstrap.Carousel(carousel, {
                interval: false,
                wrap: false
            });
        }
    });
</script>

<script src="https://cdn.socket.io/4.0.1/socket.io.min.js"></script>
<script>
    const socket = io();

    socket.on('prediction', function (data) {
        document.getElementById('translatedText').value = data.text;
    });

    document.getElementById('resetButton').onclick = function () {
        document.getElementById('translatedText').value = '';
    };

    document.getElementById('speakButton').onclick = function () {
        const text = document.getElementById('translatedText').value;
        if (!text) return;
        speechSynthesis.speak(new SpeechSynthesisUtterance(text));
    };
</script>

</body>
</html>
